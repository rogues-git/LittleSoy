<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF6EF"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02604f"/><stop offset="1" stop-color="#012620"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4D1AE"/><stop offset="1" stop-color="#C5A06A"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1000" fill="url(#bg)"/>
  <circle cx="820" cy="180" r="220" fill="#C5A06A" opacity="0.12"/>
  <circle cx="160" cy="840" r="180" fill="#014D40" opacity="0.08"/>
  
  <ellipse cx="500" cy="860" rx="380" ry="50" fill="#014D40" opacity="0.06"/>
  <!-- stacked boxes -->
  <g transform="translate(180 430)">
    <rect x="0" y="120" width="220" height="200" rx="12" fill="url(#go)"/>
    <rect x="0" y="120" width="220" height="50" fill="#C5A06A"/>
    <rect x="90" y="120" width="40" height="200" fill="#014D40" opacity="0.18"/>
    <rect x="60" y="-20" width="200" height="180" rx="12" fill="url(#em)"/>
    <rect x="60" y="-20" width="200" height="46" fill="#02604f"/>
    <rect x="140" y="-20" width="40" height="180" fill="#C5A06A" opacity="0.3"/>
  </g>
  <!-- big product bottle -->
  <g transform="translate(600 360)">
    <rect x="60" y="-40" width="50" height="36" rx="6" fill="#012620"/>
    <rect x="40" y="-4" width="90" height="30" rx="8" fill="#014D40"/>
    <path d="M30 26h110c12 0 22 10 22 22v260c0 16-12 28-28 28H36c-16 0-28-12-28-28V48c0-12 10-22 22-22z" fill="url(#em)"/>
    <rect x="30" y="120" width="110" height="92" rx="8" fill="#FAF6EF"/>
    <rect x="48" y="142" width="74" height="12" rx="6" fill="#C5A06A"/>
    <rect x="48" y="166" width="56" height="9" rx="4" fill="#014D40" opacity="0.5"/>
    <rect x="48" y="184" width="64" height="9" rx="4" fill="#014D40" opacity="0.5"/>
  </g>
  <!-- check badge -->
  <g transform="translate(470 250)">
    <circle r="46" fill="#C5A06A"/>
    <path d="M-22 2l14 16 28-32" stroke="#012620" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <circle cx="760" cy="700" r="10" fill="#C5A06A"/>
  <circle cx="300" cy="300" r="8" fill="#014D40" opacity="0.5"/>
  
</svg>

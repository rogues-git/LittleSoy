<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF6EF"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02604f"/><stop offset="1" stop-color="#012620"/>
    </linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4D1AE"/><stop offset="1" stop-color="#C5A06A"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1000" fill="url(#bg)"/>
  <circle cx="820" cy="180" r="220" fill="#C5A06A" opacity="0.12"/>
  <circle cx="160" cy="840" r="180" fill="#014D40" opacity="0.08"/>
  
  <!-- floor -->
  <ellipse cx="500" cy="860" rx="380" ry="50" fill="#014D40" opacity="0.06"/>
  <!-- cleaning cart -->
  <g transform="translate(540 360)">
    <rect x="0" y="0" width="300" height="40" rx="10" fill="url(#em)"/>
    <rect x="20" y="40" width="16" height="380" fill="#014D40"/>
    <rect x="264" y="40" width="16" height="380" fill="#014D40"/>
    <rect x="0" y="150" width="300" height="14" fill="#014D40" opacity="0.5"/>
    <rect x="0" y="290" width="300" height="14" fill="#014D40" opacity="0.5"/>
    <!-- yellow bag -->
    <path d="M30 60h240l-20 80H50z" fill="url(#go)"/>
    <!-- bottles on top shelf -->
    <rect x="60" y="-70" width="44" height="70" rx="8" fill="#014D40"/>
    <rect x="66" y="-92" width="14" height="26" rx="4" fill="#012620"/>
    <rect x="120" y="-60" width="40" height="60" rx="8" fill="#C5A06A"/>
    <rect x="200" y="-80" width="44" height="80" rx="8" fill="#02604f"/>
    <rect x="206" y="-100" width="14" height="24" rx="4" fill="#012620"/>
    <!-- wheels -->
    <circle cx="36" cy="430" r="22" fill="#012620"/><circle cx="36" cy="430" r="8" fill="#C5A06A"/>
    <circle cx="264" cy="430" r="22" fill="#012620"/><circle cx="264" cy="430" r="8" fill="#C5A06A"/>
  </g>
  <!-- mop + bucket -->
  <g transform="translate(170 300)">
    <rect x="150" y="-40" width="14" height="430" rx="7" fill="#014D40"/>
    <path d="M120 380h74l24 120H96z" fill="url(#em)"/>
    <ellipse cx="157" cy="380" rx="50" ry="16" fill="#C5A06A"/>
    <g stroke="#E4D1AE" stroke-width="6" stroke-linecap="round">
      <line x1="120" y1="384" x2="110" y2="440"/><line x1="140" y1="386" x2="135" y2="450"/>
      <line x1="160" y1="386" x2="160" y2="452"/><line x1="180" y1="386" x2="190" y2="448"/>
      <line x1="195" y1="384" x2="205" y2="438"/>
    </g>
  </g>
  <!-- sparkle -->
  <g transform="translate(430 250)" fill="#C5A06A">
    <path d="M0 -34 L8 -8 L34 0 L8 8 L0 34 L-8 8 L-34 0 L-8 -8 Z"/>
  </g>
  <circle cx="360" cy="180" r="10" fill="#C5A06A"/>
  <circle cx="720" cy="300" r="8" fill="#014D40" opacity="0.5"/>
  
</svg>
